name: Daily Stock Picks

on:
  workflow_dispatch:
  schedule:
    # Weekdays only. 13:23 UTC = 09:23 ET (EST, UTC-5). During EDT (UTC-4) adjust to 13:23 for 09:23 ET.
    # NYSE opens at 09:30 ET. Running at 09:23 gives a buffer before open.
    # To match UK time: 13:23 UTC = 14:23 BST / 13:23 GMT.
    - cron: "23 13 * * 1-5"

jobs:
  run-daily-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run picker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_TABLE: ${{ secrets.SNOWFLAKE_TABLE }}
        run: python src/run_daily.py

      - name: Upload daily report
        uses: actions/upload-artifact@v5
        with:
          name: daily-stock-picks
          path: output/
          retention-days: 30
